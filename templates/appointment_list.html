<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách lịch khám</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">

        <h2>Danh sách lịch khám</h2>

        <div>
            <a href="/appointments/add" class="btn btn-success">
                Thêm lịch khám
            </a>

            <a href="/dashboard" class="btn btn-secondary">
                Quay lại
            </a>
        </div>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
            <tr>
                <th>Bệnh nhân</th>
                <th>Bác sĩ</th>
                <th>Ngày khám</th>
                <th>Giờ khám</th>
                <th>Thao tác</th>
            </tr>
        </thead>

        <tbody>

        {% for appointment in appointments %}

            <tr>

                <td>{{ appointment.patient }}</td>
                <td>{{ appointment.doctor }}</td>
                <td>{{ appointment.date }}</td>
                <td>{{ appointment.time }}</td>

                <td>

                    <a href="/appointments/edit/{{ appointment._id }}"
                       class="btn btn-warning btn-sm">
                        Sửa
                    </a>

                    <a href="/appointments/delete/{{ appointment._id }}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa lịch khám này?')">
                        Xóa
                    </a>

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
