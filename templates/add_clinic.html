<!DOCTYPE html>
<html>
<head>
    <title>Thêm phòng khám</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<div class="card p-4 shadow">

    <h2>Thêm phòng khám</h2>

    <form method="POST">

        <input
            type="text"
            name="name"
            class="form-control mb-3"
            placeholder="Tên phòng khám"
            required>

        <input
            type="text"
            name="address"
            class="form-control mb-3"
            placeholder="Địa chỉ"
            required>

        <input
            type="text"
            name="phone"
            class="form-control mb-3"
            placeholder="Số điện thoại"
            required>

        <select
            name="specialty"
            class="form-control mb-3"
            required>

            <option value="">
                -- Chọn chuyên khoa --
            </option>

            {% for specialty in specialties %}

            <option value="{{ specialty.name }}">
                {{ specialty.name }}
            </option>

            {% endfor %}

        </select>

        <input
            type="text"
            name="lat"
            class="form-control mb-3"
            placeholder="Vĩ độ (Latitude)"
            required>

        <input
            type="text"
            name="lng"
            class="form-control mb-3"
            placeholder="Kinh độ (Longitude)"
            required>

        <button class="btn btn-primary">
            Lưu
        </button>

        <a href="/clinics" class="btn btn-secondary">
            Hủy
        </a>

    </form>

</div>

</div>

</body>
</html>
