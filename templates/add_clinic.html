{% extends "base.html" %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-lg rounded-4">

            <div class="card-header bg-success text-white p-4 rounded-top-4">

                <h2 class="mb-0">
                    🏥 Thêm phòng khám
                </h2>

                <small>
                    Nhập thông tin phòng khám mới
                </small>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Tên phòng khám
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control form-control-lg"
                            placeholder="Ví dụ: Phòng khám Đa khoa ABC"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Địa chỉ
                        </label>

                        <input
                            type="text"
                            name="address"
                            class="form-control form-control-lg"
                            placeholder="Nhập địa chỉ phòng khám"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Số điện thoại
                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control form-control-lg"
                            placeholder="Nhập số điện thoại"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Chuyên khoa
                        </label>

                        <select
                            name="specialty"
                            class="form-select form-select-lg"
                            required>

                            <option value="">
                                -- Chọn chuyên khoa --
                            </option>

                            {% for specialty in specialties %}

                            <option value="{{ specialty.name }}">
                                {{ specialty.name }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-semibold">
                                🌍 Vĩ độ (Latitude)
                            </label>

                            <input
                                type="text"
                                name="lat"
                                class="form-control form-control-lg"
                                placeholder="21.0285"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-semibold">
                                📍 Kinh độ (Longitude)
                            </label>

                            <input
                                type="text"
                                name="lng"
                                class="form-control form-control-lg"
                                placeholder="105.8542"
                                required>

                        </div>

                    </div>

                    <div class="alert alert-info">

                        💡 Bạn có thể lấy tọa độ từ Google Maps.

                    </div>

                    <div class="d-flex gap-2 mt-4">

                        <button
                            type="submit"
                            class="btn btn-success btn-lg">

                            Lưu phòng khám

                        </button>

                        <a
                            href="/clinics"
                            class="btn btn-outline-secondary btn-lg">

                            Hủy

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

{% endblock %}
