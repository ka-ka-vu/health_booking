{% extends "base.html" %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-lg rounded-4">

            <div class="card-header bg-success text-white p-4 rounded-top-4">

                <h2 class="mb-0">
                    💊 Đăng bán thuốc
                </h2>

                <small>
                    Thêm thuốc mới vào hệ thống
                </small>

            </div>

            <div class="card-body p-4">

                <form method="POST" enctype="multipart/form-data">

                    <!-- Tên thuốc -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Tên thuốc
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control form-control-lg"
                            placeholder="Nhập tên thuốc"
                            required>

                    </div>

                    <!-- Ảnh thuốc -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            🖼 Hình ảnh thuốc
                        </label>

                        <input
                            type="file"
                            name="image"
                            class="form-control form-control-lg"
                            accept="image/*"
                            required>

                    </div>

                    <!-- Giá -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            💰 Giá bán (VNĐ)
                        </label>

                        <input
                            type="number"
                            name="price"
                            class="form-control form-control-lg"
                            placeholder="Ví dụ: 150000"
                            required>

                    </div>

                    <!-- Số lượng -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            📦 Số lượng
                        </label>

                        <input
                            type="number"
                            name="quantity"
                            class="form-control form-control-lg"
                            placeholder="Nhập số lượng"
                            required>

                    </div>

                    <!-- Mô tả -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            📝 Mô tả thuốc
                        </label>

                        <textarea
                            name="description"
                            rows="5"
                            class="form-control"
                            placeholder="Mô tả công dụng, thành phần, hướng dẫn sử dụng..."></textarea>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-success btn-lg">

                            Đăng thuốc

                        </button>

                        <a
                            href="/doctor-dashboard"
                            class="btn btn-outline-secondary btn-lg">

                            Quay lại

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

{% endblock %}
