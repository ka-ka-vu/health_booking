<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng bán thuốc</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

```
<div class="card shadow p-5 mx-auto" style="max-width:700px">

    <h2 class="text-center mb-4">
        Đăng bán thuốc
    </h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label class="form-label">
                Tên thuốc
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Hình ảnh thuốc
            </label>

            <input
                type="file"
                name="image"
                class="form-control"
                accept="image/*"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Giá bán (VNĐ)
            </label>

            <input
                type="number"
                name="price"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Số lượng
            </label>

            <input
                type="number"
                name="quantity"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Mô tả thuốc
            </label>

            <textarea
                name="description"
                rows="4"
                class="form-control"></textarea>
        </div>

        <button
            type="submit"
            class="btn btn-success w-100">
            Đăng thuốc
        </button>

    </form>

    <hr>

    <a href="/doctor-dashboard"
       class="btn btn-secondary w-100">
        Quay lại Dashboard
    </a>

</div>
</div>

</body>
</html>
