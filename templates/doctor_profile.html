<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ bác sĩ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-5">

<h2 class="mb-4 text-center">
    Hồ sơ bác sĩ
</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">
            Họ và tên
        </label>

        <input
            type="text"
            class="form-control"
            value="{{ doctor.name }}"
            disabled>
    </div>

    <div class="mb-3">
        <label class="form-label">
            Email
        </label>

        <input
            type="email"
            class="form-control"
            value="{{ doctor.email }}"
            disabled>
    </div>

    <div class="mb-3">
        <label class="form-label">
            Số điện thoại
        </label>

        <input
            type="text"
            name="phone"
            class="form-control"
            value="{{ doctor.phone }}"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">
            Chuyên khoa
        </label>

        <input
            type="text"
            name="specialty"
            class="form-control"
            value="{{ doctor.specialty }}"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">
            Kinh nghiệm
        </label>

        <input
            type="text"
            name="experience"
            class="form-control"
            value="{{ doctor.experience }}"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">
            Địa chỉ phòng khám
        </label>

        <input
            type="text"
            name="clinic"
            class="form-control"
            value="{{ doctor.clinic }}"
            placeholder="Nhập địa chỉ phòng khám">
    </div>

    <button
        type="submit"
        class="btn btn-primary w-100 mb-3">
        Cập nhật hồ sơ
    </button>

</form>

<a href="/doctor-dashboard"
   class="btn btn-secondary w-100 mb-2">
    Quay lại Dashboard
</a>

<a href="/logout"
   class="btn btn-danger w-100">
    Đăng xuất
</a>

</div>

</div>

</body>
</html>
