<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chat với bệnh nhân</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2>
Chat với bệnh nhân {{ patient.fullname }}
</h2>

<hr>

<div id="chat-box"
class="border rounded p-3 mb-3 bg-white"
style="height:400px;overflow-y:auto;">

{% for msg in messages %}

<div class="mb-2">

{% if msg.sender_role == "doctor" %}

<div class="text-end">
<span class="badge bg-success">
Bác sĩ
</span>
<br>
{{ msg.message }}
</div>

{% else %}

<div class="text-start">
<span class="badge bg-primary">
{{ msg.sender_name }}
</span>
<br>
{{ msg.message }}
</div>

{% endif %}

</div>

{% endfor %}

</div>

<div class="input-group">

<input
type="text"
id="message"
class="form-control"
placeholder="Nhập tin nhắn...">

<button
class="btn btn-success"
onclick="sendMessage()">
Gửi </button>

</div>

<br>

<a href="/doctor-messages"
class="btn btn-secondary">
Quay lại </a>

</div>

</div>

<script>

const socket = io();

const room =
"{{ doctor._id }}_{{ patient._id }}";

socket.emit(
"join_room",
{
room: room
}
);

socket.on(
"receive_message",
function(data){

const box =
document.getElementById("chat-box");

let align = "text-start";
let badge = "bg-primary";

if(data.sender_role === "doctor"){
align = "text-end";
badge = "bg-success";
}

box.innerHTML += `
<div class="mb-2">
<div class="${align}">
<span class="badge ${badge}">
${data.sender_name}
</span>
<br>
${data.message}
</div>
</div>
`;

box.scrollTop =
box.scrollHeight;
}
);

function sendMessage(){

let message =
document.getElementById("message").value;

if(message.trim() === "")
return;

socket.emit(
"send_message",
{
room: room,
sender_name: "{{ session['fullname'] }}",
sender_role: "doctor",
message: message
}
);

document.getElementById("message").value = "";
}

</script>

</body>
</html>
