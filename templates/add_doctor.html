{% extends "base.html" %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-lg rounded-4">

            <div class="card-header bg-primary text-white p-4 rounded-top-4">

                <h2 class="mb-0">
                    👨‍⚕️ Thêm bác sĩ
                </h2>

                <small>
                    Thêm thông tin bác sĩ vào hệ thống
                </small>

            </div>

            <div class="card-body p-4">

                <form method="POST"
                      enctype="multipart/form-data">

                    <!-- Ảnh bác sĩ -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            🖼 Ảnh bác sĩ
                        </label>

                        <input
                            type="file"
                            name="image"
                            class="form-control"
                            accept="image/*"
                            required>

                    </div>

                    <!-- Tên bác sĩ -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Họ và tên bác sĩ
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control form-control-lg"
                            placeholder="Nhập họ tên bác sĩ"
                            required>

                    </div>

                    <!-- Chuyên khoa -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            🩺 Chuyên khoa
                        </label>

                        <select
                            name="specialty"
                            class="form-select form-select-lg"
                            required>

                            <option value="">
                                -- Chọn chuyên khoa --
                            </option>

                            {% for specialty in specialties %}

                            <option value="{{ specialty.name }}">
                                {{ specialty.name }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Phòng khám -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            🏥 Phòng khám
                        </label>

                        <select
                            name="clinic"
                            class="form-select form-select-lg"
                            required>

                            <option value="">
                                -- Chọn phòng khám --
                            </option>

                            {% for clinic in clinics %}

                            <option value="{{ clinic.name }}">
                                {{ clinic.name }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Điện thoại -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            📞 Số điện thoại
                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control form-control-lg"
                            placeholder="Nhập số điện thoại"
                            required>

                    </div>

                    <!-- Email -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            📧 Email
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control form-control-lg"
                            placeholder="doctor@gmail.com"
                            required>

                    </div>

                    <!-- Kinh nghiệm -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            ⭐ Số năm kinh nghiệm
                        </label>

                        <input
                            type="number"
                            name="experience"
                            class="form-control form-control-lg"
                            placeholder="Ví dụ: 10"
                            min="0"
                            required>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                            Lưu bác sĩ

                        </button>

                        <a
                            href="/doctors"
                            class="btn btn-outline-secondary btn-lg">

                            Quay lại

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

{% endblock %}
