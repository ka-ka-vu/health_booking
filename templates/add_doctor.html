<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm bác sĩ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
<div class="card p-4 shadow">

    <h2 class="mb-4">
        Thêm bác sĩ
    </h2>

    <form method="POST">

        <input
            type="text"
            name="name"
            class="form-control mb-3"
            placeholder="Họ tên bác sĩ"
            required>

        <label class="form-label">
            Chuyên khoa
        </label>

        <select
            name="specialty"
            class="form-control mb-3"
            required>

            <option value="">
                -- Chọn chuyên khoa --
            </option>

            {% for specialty in specialties %}

            <option value="{{ specialty.name }}">
                {{ specialty.name }}
            </option>

            {% endfor %}

        </select>

        <label class="form-label">
            Phòng khám
        </label>

        <select
            name="clinic"
            class="form-control mb-3"
            required>

            <option value="">
                -- Chọn phòng khám --
            </option>

            {% for clinic in clinics %}

            <option value="{{ clinic.name }}">
                {{ clinic.name }}
            </option>

            {% endfor %}

        </select>

        <input
            type="text"
            name="phone"
            class="form-control mb-3"
            placeholder="Số điện thoại"
            required>

        <input
            type="email"
            name="email"
            class="form-control mb-3"
            placeholder="Email"
            required>

        <input
            type="number"
            name="experience"
            class="form-control mb-3"
            placeholder="Số năm kinh nghiệm"
            min="0"
            required>

        <button class="btn btn-primary">
            Lưu
        </button>

        <a href="/doctors" class="btn btn-secondary">
            Quay lại
        </a>

    </form>

</div>
</div>
</body>
</html>
