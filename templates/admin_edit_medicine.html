<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">

<title>Sửa thuốc</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4 mx-auto"
style="max-width:700px">

<h2 class="mb-4">

✏ Sửa thuốc

</h2>

<form method="POST">

<div class="mb-3">

<label>Tên thuốc</label>

<input
name="name"
value="{{ medicine.name }}"
class="form-control">

</div>

<div class="mb-3">

<label>Giá</label>

<input
type="number"
name="price"
value="{{ medicine.price }}"
class="form-control">

</div>

<div class="mb-3">

<label>Số lượng</label>

<input
type="number"
name="quantity"
value="{{ medicine.quantity }}"
class="form-control">

</div>

<div class="mb-3">

<label>Mô tả</label>

<textarea
name="description"
class="form-control"
rows="3">{{ medicine.description }}</textarea>

</div>

<div class="mb-3">

<label>Bác sĩ</label>

<input
name="doctor_name"
value="{{ medicine.doctor_name }}"
class="form-control">

</div>

<div class="mb-3">

<label>Link ảnh</label>

<input
name="image"
value="{{ medicine.image }}"
class="form-control">

</div>

<button
class="btn btn-warning">

Cập nhật

</button>

<a href="/admin/medicines"
class="btn btn-secondary">

Quay lại

</a>

</form>

</div>

</div>

</body>
</html>
