<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chat với bác sĩ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2>
    Chat với {{ doctor.name }}
</h2>

<p>
    Chuyên khoa:
    <b>{{ doctor.specialty }}</b>
</p>

<hr>

<div id="chat-box"
     class="border rounded p-3 mb-3 bg-white"
     style="height:400px;overflow-y:auto;">

    {% for msg in messages %}

    <div class="mb-2">

        <b>{{ msg.sender_name }}:</b>

        {{ msg.message }}

    </div>

    {% endfor %}

</div>

<div class="input-group">

    <input
        type="text"
        id="message"
        class="form-control"
        placeholder="Nhập tin nhắn...">

    <button
        class="btn btn-primary"
        onclick="sendMessage()">
        Gửi
    </button>

</div>

<br>

<a href="/chat-doctor"
   class="btn btn-secondary">
    Quay lại
</a>

</div>

</div>

<script>

const socket = io();

const room =
"{{ doctor._id }}_{{ session['user_id'] }}";

socket.emit(
    "join_room",
    {
        room: room
    }
);

const chatBox =
document.getElementById("chat-box");

chatBox.scrollTop =
chatBox.scrollHeight;

socket.on(
    "receive_message",
    function(data){

        chatBox.innerHTML +=
        `
        <div class="mb-2">
            <b>${data.sender_name}:</b>
            ${data.message}
        </div>
        `;

        chatBox.scrollTop =
        chatBox.scrollHeight;
    }
);

function sendMessage(){

    let message =
    document.getElementById("message").value;

    if(message.trim() === "")
        return;

    socket.emit(
        "send_message",
        {
            room: room,
            sender_name:
                "{{ session['fullname'] }}",
            sender_role: "user",
            message: message
        }
    );

    document.getElementById("message").value = "";

    document.getElementById("message").focus();
}

document
.getElementById("message")
.addEventListener(
    "keypress",
    function(e){

        if(e.key === "Enter"){

            e.preventDefault();

            sendMessage();
        }

    }
);

</script>

</body>
</html>
