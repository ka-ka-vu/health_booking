<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tư vấn chuyên khoa</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<div class="card shadow p-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h2>Tư vấn chuyên khoa</h2>

        <a href="/dashboard" class="btn btn-secondary">
            Quay lại
        </a>

    </div>

    <form method="POST">

        <label class="form-label">
            Nhập triệu chứng
        </label>

        <textarea
            name="symptom"
            class="form-control"
            rows="4"
            placeholder="Ví dụ: đau đầu, chóng mặt, sốt, đau bụng..."
            required></textarea>

        <button
            type="submit"
            class="btn btn-primary mt-3">
            Phân tích
        </button>

    </form>

    {% if specialty %}

    <hr>

    <div class="alert alert-success">

        <h4>
            Chuyên khoa đề xuất:
            {{ specialty }}
        </h4>

        <p>
            Bác sĩ phù hợp nhất:
            <b>{{ doctor }}</b>
        </p>

        <div class="mt-3">

            <a href="/appointments/add"
               class="btn btn-success">
                Đặt lịch ngay
            </a>

            <a href="/doctors"
               class="btn btn-outline-primary">
                Xem danh sách bác sĩ
            </a>

        </div>

    </div>

    {% endif %}

</div>
</div>

</body>
</html>
