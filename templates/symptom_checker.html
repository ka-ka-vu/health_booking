<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tư vấn chuyên khoa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="mb-0">
            Tư vấn chuyên khoa
        </h2>

        <a href="/dashboard"
           class="btn btn-secondary">
            Quay lại
        </a>

    </div>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Nhập triệu chứng
            </label>

            <textarea
                name="symptom"
                class="form-control"
                rows="4"
                placeholder="Ví dụ: đau đầu, chóng mặt, sốt, đau bụng..."
                required></textarea>

        </div>

        <button
            type="submit"
            class="btn btn-primary">
            Phân tích triệu chứng
        </button>

    </form>

    {% if specialty %}

    <hr>

    <div class="alert alert-success">

        <h4 class="mb-3">
            Chuyên khoa đề xuất:
            <strong>{{ specialty }}</strong>
        </h4>

        <p class="mb-3">

            Bác sĩ phù hợp nhất:

            <b>{{ doctor }}</b>

        </p>

        <div class="d-flex gap-2 flex-wrap">

            <a href="/appointments/add"
               class="btn btn-success">
                Đặt lịch ngay
            </a>

            <a href="/doctors"
               class="btn btn-outline-primary">
                Xem danh sách bác sĩ
            </a>

        </div>

    </div>

    {% endif %}

</div>

</div>

</body>
</html>
