<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách chuyên khoa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="mb-0">
            Danh sách chuyên khoa
        </h2>

        <div>

            <a href="/specialties/add"
               class="btn btn-success">
                + Thêm chuyên khoa
            </a>

            <a href="/dashboard"
               class="btn btn-secondary">
                Quay lại
            </a>

        </div>

    </div>

    {% if specialties %}

    <table class="table table-bordered table-hover align-middle">

        <thead class="table-dark">

            <tr>
                <th width="70%">Tên chuyên khoa</th>
                <th width="30%">Thao tác</th>
            </tr>

        </thead>

        <tbody>

        {% for specialty in specialties %}

            <tr>

                <td>
                    <b>{{ specialty.name }}</b>
                </td>

                <td>

                    <a href="/specialties/edit/{{ specialty._id }}"
                       class="btn btn-warning btn-sm">
                        Sửa
                    </a>

                    <a href="/specialties/delete/{{ specialty._id }}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa chuyên khoa này?')">
                        Xóa
                    </a>

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

    {% else %}

    <div class="alert alert-info">
        Chưa có chuyên khoa nào trong hệ thống.
    </div>

    {% endif %}

</div>

</div>

</body>
</html>
