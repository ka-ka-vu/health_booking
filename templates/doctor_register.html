{% extends "base.html" %}

{% block title %}
Đăng ký tài khoản bác sĩ
{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

    <div class="card border-0 shadow-lg">

        <div class="card-header bg-success text-white text-center p-4">

            <h2 class="mb-2">
                👨‍⚕️ Đăng ký tài khoản bác sĩ
            </h2>

            <p class="mb-0">
                Tham gia hệ thống Health Booking
            </p>

        </div>

        <div class="card-body p-4">

            <form method="POST"
                  enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Họ và tên
                    </label>

                    <input
                        type="text"
                        name="fullname"
                        class="form-control"
                        placeholder="Nhập họ và tên"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Email
                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        placeholder="example@gmail.com"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Mật khẩu
                    </label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        placeholder="Nhập mật khẩu"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Chuyên khoa
                    </label>

                    <select
                        name="specialty"
                        class="form-select"
                        required>

                        <option value="">
                            -- Chọn chuyên khoa --
                        </option>

                        {% for specialty in specialties %}

                        <option value="{{ specialty.name }}">
                            {{ specialty.name }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Số điện thoại
                    </label>

                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        placeholder="Nhập số điện thoại"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Địa chỉ phòng khám
                    </label>

                    <input
                        type="text"
                        name="clinic_address"
                        class="form-control"
                        placeholder="Nhập địa chỉ phòng khám"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Số năm kinh nghiệm
                    </label>

                    <input
                        type="number"
                        name="experience"
                        class="form-control"
                        min="0"
                        placeholder="Ví dụ: 5"
                        required>

                </div>

                <div class="mb-4">

                    <label class="form-label fw-bold">
                        🖼 Ảnh bác sĩ
                    </label>

                    <input
                        type="file"
                        name="image"
                        class="form-control"
                        accept="image/*"
                        required>

                    <small class="text-muted">
                        Chọn ảnh chân dung bác sĩ
                    </small>

                </div>

                <button
                    type="submit"
                    class="btn btn-success btn-lg w-100">

                    🚀 Đăng ký bác sĩ

                </button>

            </form>

        </div>

        <div class="card-footer bg-light">

            <a href="/login"
               class="btn btn-secondary w-100">

                ⬅ Quay lại đăng nhập

            </a>

        </div>

    </div>

</div>

</div>

</div>

{% endblock %}
