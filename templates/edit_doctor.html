{% extends "base.html" %}

{% block title %}
Sửa bác sĩ
{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-lg rounded-4">

            <div class="card-header bg-warning text-dark p-4 rounded-top-4">

                <h2 class="mb-0">

                    👨‍⚕️ Sửa thông tin bác sĩ

                </h2>

                <small>

                    Cập nhật hồ sơ bác sĩ trong hệ thống

                </small>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Họ và tên

                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control form-control-lg"
                            value="{{ doctor.name }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Chuyên khoa

                        </label>

                        <select
                            name="specialty"
                            class="form-select form-select-lg"
                            required>

                            {% for specialty in specialties %}

                            <option
                                value="{{ specialty.name }}"
                                {% if specialty.name == doctor.specialty %}
                                selected
                                {% endif %}>

                                {{ specialty.name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            🏥 Phòng khám

                        </label>

                        <select
                            name="clinic"
                            class="form-select form-select-lg"
                            required>

                            {% for clinic in clinics %}

                            <option
                                value="{{ clinic.name }}"
                                {% if clinic.name == doctor.clinic %}
                                selected
                                {% endif %}>

                                {{ clinic.name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            📞 Số điện thoại

                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control form-control-lg"
                            value="{{ doctor.phone }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            📧 Email

                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control form-control-lg"
                            value="{{ doctor.email }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            ⭐ Kinh nghiệm (năm)

                        </label>

                        <input
                            type="number"
                            name="experience"
                            class="form-control form-control-lg"
                            value="{{ doctor.experience }}"
                            min="0"
                            required>

                    </div>

                    <div class="alert alert-info">

                        💡 Kiểm tra kỹ thông tin trước khi cập nhật.

                    </div>

                    <div class="d-flex gap-2 mt-4">

                        <button
                            type="submit"
                            class="btn btn-warning btn-lg">

                            💾 Cập nhật

                        </button>

                        <a
                            href="/doctors"
                            class="btn btn-outline-secondary btn-lg">

                            ⬅ Quay lại

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

{% endblock %}
