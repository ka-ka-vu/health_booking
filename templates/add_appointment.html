<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt lịch khám</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Đặt lịch khám
        </h2>

        {% if error %}
        <div class="alert alert-warning shadow-sm">

            <h5>
                ⚠ {{ error }}
            </h5>

            {% if suggestions %}

            <p class="mt-3">
                Bác sĩ hiện còn trống các khung giờ sau:
            </p>

            <div>

                {% for time in suggestions %}
                    <span class="badge bg-success me-2 mb-2 p-2">
                        {{ time }}
                    </span>
                {% endfor %}

            </div>

            {% endif %}

        </div>
        {% endif %}

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Tên bệnh nhân
                </label>

                <input
                    type="text"
                    name="patient"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Bác sĩ
                </label>

                <select
                    name="doctor"
                    class="form-control"
                    required>

                    {% for doctor in doctors %}

                    <option value="{{ doctor.name }}">
                        {{ doctor.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Ngày khám
                </label>

                <input
                    type="date"
                    name="date"
                    class="form-control"
                    min="{{ today }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Giờ khám
                </label>

                <input
                    type="time"
                    name="time"
                    class="form-control"
                    min="07:00"
                    max="18:00"
                    required>

                <small class="text-muted">
                    Giờ làm việc: 07:00 - 11:30 và 13:00 - 18:00
                </small>

            </div>

            <button type="submit" class="btn btn-primary">
                Đặt lịch
            </button>

            <a href="/appointments" class="btn btn-secondary">
                Hủy
            </a>

        </form>

    </div>

</div>

</body>
</html>
