{% extends "base.html" %}

{% block title %}
Sửa chuyên khoa
{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card border-0 shadow-lg rounded-4">

            <div class="card-header bg-primary text-white p-4 rounded-top-4">

                <h2 class="mb-0">

                    🩺 Sửa chuyên khoa

                </h2>

                <small>

                    Cập nhật thông tin chuyên khoa trong hệ thống

                </small>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-4">

                        <label class="form-label fw-semibold">

                            Tên chuyên khoa

                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control form-control-lg"
                            value="{{ specialty.name }}"
                            required>

                    </div>

                    <div class="alert alert-info">

                        💡 Thay đổi tên chuyên khoa sẽ ảnh hưởng tới các bác sĩ và phòng khám liên quan.

                    </div>

                    <div class="d-flex gap-2 mt-4">

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                            💾 Cập nhật

                        </button>

                        <a
                            href="/specialties"
                            class="btn btn-outline-secondary btn-lg">

                            ⬅ Quay lại

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

{% endblock %}
