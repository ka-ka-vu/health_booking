{% extends "base.html" %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card border-0 shadow-lg rounded-4">

            <div class="card-header bg-info text-white p-4 rounded-top-4">

                <h2 class="mb-0">
                    🩺 Thêm chuyên khoa
                </h2>

                <small>
                    Tạo chuyên khoa mới cho hệ thống
                </small>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Tên chuyên khoa
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control form-control-lg"
                            placeholder="Ví dụ: Tim mạch"
                            required>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-info btn-lg text-white">

                            Lưu chuyên khoa

                        </button>

                        <a
                            href="/specialties"
                            class="btn btn-outline-secondary btn-lg">

                            Quay lại

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

{% endblock %}
