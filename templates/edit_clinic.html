{% extends "base.html" %}

{% block title %}
Sửa phòng khám
{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-lg rounded-4">

            <div class="card-header bg-success text-white p-4 rounded-top-4">

                <h2 class="mb-0">

                    🏥 Sửa phòng khám

                </h2>

                <small>

                    Cập nhật thông tin phòng khám

                </small>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Tên phòng khám

                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control form-control-lg"
                            value="{{ clinic.name }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            📍 Địa chỉ

                        </label>

                        <input
                            type="text"
                            name="address"
                            class="form-control form-control-lg"
                            value="{{ clinic.address }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            📞 Số điện thoại

                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control form-control-lg"
                            value="{{ clinic.phone }}"
                            required>

                    </div>

                    <div class="alert alert-info">

                        💡 Kiểm tra kỹ thông tin trước khi cập nhật.

                    </div>

                    <div class="d-flex gap-2 mt-4">

                        <button
                            type="submit"
                            class="btn btn-success btn-lg">

                            💾 Cập nhật

                        </button>

                        <a
                            href="/clinics"
                            class="btn btn-outline-secondary btn-lg">

                            ⬅ Quay lại

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

{% endblock %}
