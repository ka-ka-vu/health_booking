<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách phòng khám</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">

        <h2>Danh sách phòng khám</h2>

        <div>
            <a href="/clinics/add" class="btn btn-success">
                Thêm phòng khám
            </a>

            <a href="/dashboard" class="btn btn-secondary">
                Quay lại
            </a>
        </div>

    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
            <tr>
                <th>Tên phòng khám</th>
                <th>Địa chỉ</th>
                <th>Số điện thoại</th>
                <th>Thao tác</th>
            </tr>
        </thead>

        <tbody>

        {% for clinic in clinics %}

            <tr>

                <td>{{ clinic.name }}</td>
                <td>{{ clinic.address }}</td>
                <td>{{ clinic.phone }}</td>

                <td>

                    <a href="/clinics/edit/{{ clinic._id }}"
                       class="btn btn-warning btn-sm">
                        Sửa
                    </a>

                    <a href="/clinics/delete/{{ clinic._id }}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa phòng khám này?')">
                        Xóa
                    </a>

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
