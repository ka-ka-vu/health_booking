<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa lịch khám</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>Sửa lịch khám</h2>

        <form method="POST">

            <input
                type="text"
                name="patient"
                class="form-control mb-3"
                value="{{ appointment.patient }}"
                placeholder="Tên bệnh nhân"
                required>

            <select
                name="doctor"
                class="form-control mb-3"
                required>

                {% for doctor in doctors %}

                <option
                    value="{{ doctor.name }}"
                    {% if doctor.name == appointment.doctor %}
                    selected
                    {% endif %}>
                    {{ doctor.name }}
                </option>

                {% endfor %}

            </select>

            <input
                type="date"
                name="date"
                class="form-control mb-3"
                value="{{ appointment.date }}"
                required>

            <input
                type="time"
                name="time"
                class="form-control mb-3"
                value="{{ appointment.time }}"
                required>

            <button class="btn btn-primary">
                Cập nhật
            </button>

            <a href="/appointments" class="btn btn-secondary">
                Quay lại
            </a>

        </form>

    </div>

</div>

</body>
</html>
