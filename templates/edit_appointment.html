{% extends "base.html" %}

{% block title %}
Sửa lịch khám
{% endblock %}

{% block content %}

<div class="container py-5">

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card border-0 shadow-lg rounded-4">

            <div class="card-header bg-warning text-dark p-4 rounded-top-4">

                <h2 class="mb-0">

                    ✏️ Sửa lịch khám

                </h2>

                <small>

                    Cập nhật thông tin lịch khám

                </small>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            👤 Tên bệnh nhân

                        </label>

                        <input
                            type="text"
                            name="patient"
                            class="form-control form-control-lg"
                            value="{{ appointment.patient }}"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            👨‍⚕️ Bác sĩ

                        </label>

                        <select
                            name="doctor"
                            class="form-select form-select-lg"
                            required>

                            {% for doctor in doctors %}

                            <option
                                value="{{ doctor.name }}"
                                {% if doctor.name == appointment.doctor %}
                                selected
                                {% endif %}>

                                {{ doctor.name }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-semibold">

                                📅 Ngày khám

                            </label>

                            <input
                                type="date"
                                name="date"
                                class="form-control form-control-lg"
                                value="{{ appointment.date }}"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-semibold">

                                ⏰ Giờ khám

                            </label>

                            <input
                                type="time"
                                name="time"
                                class="form-control form-control-lg"
                                value="{{ appointment.time }}"
                                required>

                        </div>

                    </div>

                    <div class="alert alert-info">

                        💡 Hãy kiểm tra lại thời gian trước khi cập nhật.

                    </div>

                    <div class="d-flex gap-2 mt-4">

                        <button
                            type="submit"
                            class="btn btn-warning btn-lg">

                            💾 Cập nhật

                        </button>

                        <a
                            href="/appointments"
                            class="btn btn-outline-secondary btn-lg">

                            ⬅ Quay lại

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

{% endblock %}
